<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ListApp</title><script src="https://cdn.tailwindcss.com"></script><script src="https://unpkg.com/dexie@4/dist/dexie.js"></script></head><body class="min-h-screen bg-white"><header class="border-b p-4"><div class="max-w-5xl mx-auto flex justify-between items-center"><h1 class="text-xl font-bold">ListApp</h1><span class="text-sm text-gray-500">本地存储</span></div></header><main class="max-w-5xl mx-auto p-4"><div class="flex justify-between items-center mb-8"><h2 class="text-2xl font-semibold">我的列表</h2><button onclick="showDialog()" class="bg-black text-white px-4 py-2 rounded hover:opacity-80">创建列表</button></div><div id="lists" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div><div id="empty" class="text-center py-12 text-gray-500 hidden"><p>暂无列表</p></div></main><div id="dlg" class="fixed inset-0 bg-black/50 hidden items-center justify-center" onclick="if(event.target===this)hideDialog()"><div class="bg-white p-6 rounded-lg w-full max-w-md mx-4"><h3 class="text-lg font-semibold mb-2">创建列表</h3><input id="inp" class="w-full border p-2 rounded mb-4" placeholder="列表名称" onkeydown="if(event.key==='Enter')create()"><div class="flex justify-end gap-2"><button onclick="hideDialog()" class="border px-4 py-2 rounded">取消</button><button onclick="create()" class="bg-black text-white px-4 py-2 rounded">创建</button></div></div></div><script>const db=new Dexie('ListApp');db.version(1).stores({lists:'++id,title,items'});let lists=[];async function load(){lists=await db.lists.toArray();render();}function render(){const el=document.getElementById('lists'),empty=document.getElementById('empty');if(!lists.length){el.innerHTML='';empty.classList.remove('hidden');return;}empty.classList.add('hidden');el.innerHTML=lists.map(l=>`<div class="border p-4 rounded hover:shadow cursor-pointer"><h3 class="font-semibold">${l.title}</h3><p class="text-sm text-gray-500">${(l.items||[]).length}项</p><div class="flex gap-2 mt-3"><button class="border px-3 py-1 text-sm rounded flex-1">查看</button><button onclick="event.stopPropagation();del(${l.id})" class="border px-3 py-1 text-sm rounded">删除</button></div></div>`).join('');}function showDialog(){document.getElementById('dlg').classList.remove('hidden');document.getElementById('dlg').classList.add('flex');document.getElementById('inp').focus();}function hideDialog(){document.getElementById('dlg').classList.add('hidden');document.getElementById('dlg').classList.remove('flex');document.getElementById('inp').value='';}async function create(){const v=document.getElementById('inp').value.trim();if(!v)return;await db.lists.add({title:v,items:[]});hideDialog();load();}async function del(id){if(!confirm('确定删除？'))return;await db.lists.delete(id);load();}load();</script></body></html>
