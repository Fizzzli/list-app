<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ListApp v3 - 智能列表</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/dexie@4/dist/dexie.js"></script>
  <style>
    :root { --bg: #fafafa; --fg: #1a1a1a; --border: #e5e5e5; --primary: #18181b; --muted: #71717a; --accent: #f4f4f5; }
    body { background: var(--bg); color: var(--fg); font-family: system-ui, -apple-system, sans-serif; }
    .btn { @apply px-4 py-2 bg-[var(--primary)] text-white rounded-md hover:opacity-90 transition-opacity text-sm font-medium; }
    .btn-outline { @apply px-4 py-2 border border-[var(--border)] hover:bg-[var(--accent)] transition-colors text-sm font-medium rounded-md; }
    .btn-ghost { @apply px-3 py-1.5 hover:bg-[var(--accent)] transition-colors text-sm rounded-md; }
    .btn-icon { @apply w-8 h-8 flex items-center justify-center rounded-md hover:bg-[var(--accent)] transition-colors; }
    .card { @apply bg-white border border-[var(--border)] rounded-lg p-4 hover:shadow-md transition-shadow cursor-pointer; }
    .input { @apply w-full px-3 py-2 border border-[var(--border)] rounded-md focus:outline-none focus:ring-2 focus:ring-[var(--primary)] text-sm; }
    .progress-bar { @apply h-2 bg-gray-200 rounded-full overflow-hidden; }
    .progress-fill { @apply h-full transition-all duration-300; }
    
    /* 紧凑模式 */
    .compact .item-row { @apply py-2; }
    .compact .item-text { @apply text-sm; }
    .compact .item-meta { @apply text-xs; }
    
    /* 模板颜色 */
    .tpl-default { --tpl-color: #18181b; }
    .tpl-books { --tpl-color: #dc2626; }
    .tpl-movies { --tpl-color: #7c3aed; }
    .tpl-restaurants { --tpl-color: #ea580c; }
    .tpl-travel { --tpl-color: #059669; }
    .tpl-shopping { --tpl-color: #db2777; }
    .tpl-goals { --tpl-color: #2563eb; }
  </style>
</head>
<body class="min-h-screen">
  <!-- Header -->
  <header class="bg-white border-b border-[var(--border)] sticky top-0 z-40">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <button id="backBtn" onclick="goHome()" class="hidden text-lg">←</button>
        <h1 class="text-lg font-bold">ListApp <span class="text-xs text-gray-400">v3.0</span></h1>
      </div>
      <div class="flex items-center gap-1">
        <span id="status" class="text-xs text-[var(--muted)] mr-2"></span>
        <button onclick="toggleCompactMode()" class="btn-icon" title="紧凑模式">📐</button>
        <button onclick="showSettings()" class="btn-icon" title="设置">⚙️</button>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="max-w-5xl mx-auto px-4 py-6" id="mainContainer">
    <!-- Home -->
    <div id="homeView">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-2xl font-semibold">我的列表</h2>
        <button onclick="showTemplateDialog()" class="btn">+ 新建</button>
      </div>
      
      <!-- Stats -->
      <div class="grid grid-cols-3 gap-4 mb-6">
        <div class="bg-white border rounded-lg p-3 text-center">
          <p id="totalLists" class="text-2xl font-bold">0</p>
          <p class="text-xs text-[var(--muted)]">列表</p>
        </div>
        <div class="bg-white border rounded-lg p-3 text-center">
          <p id="totalItems" class="text-2xl font-bold">0</p>
          <p class="text-xs text-[var(--muted)]">条目</p>
        </div>
        <div class="bg-white border rounded-lg p-3 text-center">
          <p id="completedItems" class="text-2xl font-bold">0</p>
          <p class="text-xs text-[var(--muted)]">已完成</p>
        </div>
      </div>
      
      <!-- Filters -->
      <div class="flex gap-2 mb-4 overflow-x-auto pb-2">
        <button onclick="filterByTemplate('all')" class="btn-ghost whitespace-nowrap">全部</button>
        <button onclick="filterByTemplate('books')" class="btn-ghost whitespace-nowrap">📚</button>
        <button onclick="filterByTemplate('movies')" class="btn-ghost whitespace-nowrap">🎬</button>
        <button onclick="filterByTemplate('restaurants')" class="btn-ghost whitespace-nowrap">🍽️</button>
        <button onclick="filterByTemplate('travel')" class="btn-ghost whitespace-nowrap">✈️</button>
        <button onclick="filterByTemplate('shopping')" class="btn-ghost whitespace-nowrap">🛍️</button>
        <button onclick="filterByTemplate('goals')" class="btn-ghost whitespace-nowrap">🎯</button>
      </div>
      
      <div id="listsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
      <div id="emptyState" class="text-center py-16 text-[var(--muted)] hidden">
        <p class="text-lg">暂无列表</p>
        <p class="text-sm mt-1">创建第一个列表开始记录</p>
      </div>
    </div>

    <!-- Detail -->
    <div id="detailView" class="hidden">
      <div class="bg-white border rounded-lg p-4 mb-4">
        <div class="flex items-start justify-between">
          <div>
            <h2 id="detailTitle" class="text-xl font-semibold"></h2>
            <p id="detailMeta" class="text-sm text-[var(--muted)] mt-1"></p>
          </div>
          <span id="detailTemplate" class="text-2xl"></span>
        </div>
        <div class="mt-3">
          <div class="flex justify-between text-xs text-[var(--muted)] mb-1">
            <span>进度</span>
            <span id="progressText">0%</span>
          </div>
          <div class="progress-bar"><div id="progressBar" class="progress-fill" style="width:0%"></div></div>
        </div>
      </div>
      
      <!-- Quick Add -->
      <div class="bg-white border rounded-lg p-3 mb-4">
        <input id="quickAddInput" type="text" class="input" placeholder="添加条目... (支持：明天、高优先级、每天)" onkeydown="if(event.key==='Enter')quickAdd()">
        <div class="flex items-center gap-2 mt-2">
          <button onclick="quickAdd()" class="btn text-xs py-1.5">添加</button>
          <button onclick="toggleSubtaskInput()" class="btn-ghost text-xs">➕ 子任务</button>
          <span class="text-xs text-[var(--muted)] flex-1 text-right">💡 "买牛奶 明天 高优先级"</span>
        </div>
        <div id="subtaskInput" class="hidden mt-2">
          <input id="parentItemInput" type="text" class="input mb-2 text-xs" placeholder="父任务名称">
          <textarea id="subtasksInput" class="input text-xs" rows="2" placeholder="子任务，每行一个"></textarea>
          <button onclick="addWithSubtasks()" class="btn text-xs mt-2 py-1.5">添加子任务</button>
        </div>
      </div>
      
      <!-- Filters -->
      <div class="flex gap-2 mb-3">
        <button onclick="filterItems('all')" class="btn-ghost text-xs">全部</button>
        <button onclick="filterItems('active')" class="btn-ghost text-xs">未完成</button>
        <button onclick="filterItems('done')" class="btn-ghost text-xs">已完成</button>
        <button onclick="clearCompleted()" class="btn-ghost text-xs text-red-500 ml-auto">清理已完成</button>
      </div>
      
      <div id="itemsList"></div>
    </div>
  </main>

  <!-- Template Dialog -->
  <div id="templateDialog" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50" onclick="if(event.target===this)hideTemplateDialog()">
    <div class="bg-white rounded-lg p-5 w-full max-w-lg mx-4 max-h-[90vh] overflow-y-auto">
      <h3 class="text-lg font-semibold mb-1">创建新列表</h3>
      <p class="text-sm text-[var(--muted)] mb-4">选择模板</p>
      <div class="grid grid-cols-2 gap-3 mb-4">
        <button onclick="selectTemplate('default')" class="tpl-card border-2 border-gray-200 rounded-lg p-3 text-left hover:border-black">📝 普通</button>
        <button onclick="selectTemplate('books')" class="tpl-card border-2 border-gray-200 rounded-lg p-3 text-left hover:border-black">📚 书单</button>
        <button onclick="selectTemplate('movies')" class="tpl-card border-2 border-gray-200 rounded-lg p-3 text-left hover:border-black">🎬 影单</button>
        <button onclick="selectTemplate('restaurants')" class="tpl-card border-2 border-gray-200 rounded-lg p-3 text-left hover:border-black">🍽️ 餐厅</button>
        <button onclick="selectTemplate('travel')" class="tpl-card border-2 border-gray-200 rounded-lg p-3 text-left hover:border-black">✈️ 旅行</button>
        <button onclick="selectTemplate('shopping')" class="tpl-card border-2 border-gray-200 rounded-lg p-3 text-left hover:border-black">🛍️ 购物</button>
        <button onclick="selectTemplate('goals')" class="tpl-card border-2 border-gray-200 rounded-lg p-3 text-left hover:border-black col-span-2">🎯 目标</button>
      </div>
      <input id="listTitleInput" type="text" class="input mb-4" placeholder="列表名称...">
      <div class="flex justify-end gap-2">
        <button onclick="hideTemplateDialog()" class="btn-outline">取消</button>
        <button onclick="createList()" class="btn">创建</button>
      </div>
    </div>
  </div>

  <!-- Settings -->
  <div id="settingsDialog" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50" onclick="if(event.target===this)hideSettings()">
    <div class="bg-white rounded-lg p-5 w-full max-w-md mx-4">
      <h3 class="text-lg font-semibold mb-4">设置</h3>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-2">显示模式</label>
          <button onclick="toggleCompactMode()" class="btn-outline w-full" id="compactBtn">切换紧凑/舒适模式</button>
        </div>
        <div>
          <label class="block text-sm font-medium mb-2">数据</label>
          <div class="flex gap-2">
            <button onclick="exportData()" class="btn-outline flex-1">📥 导出</button>
            <button onclick="showImport()" class="btn-outline flex-1">📤 导入</button>
          </div>
        </div>
        <button onclick="clearAllData()" class="btn-outline w-full text-red-500">⚠️ 清空所有数据</button>
      </div>
      <div class="flex justify-end mt-4"><button onclick="hideSettings()" class="btn">关闭</button></div>
    </div>
  </div>

  <script>
    // ========== DB ==========
    const db = new Dexie('ListAppDB_v3');
    db.version(1).stores({ lists: '++id, title, template, lastModified', settings: 'key' });
    
    // ========== State ==========
    let lists = [], currentListId = null, selectedTemplate = 'default', currentFilter = 'all', itemFilter = 'all';
    let compactMode = false;

    // ========== Templates ==========
    const templates = {
      default: { icon: '📝', name: '普通', color: '#18181b' },
      books: { icon: '📚', name: '书单', color: '#dc2626' },
      movies: { icon: '🎬', name: '影单', color: '#7c3aed' },
      restaurants: { icon: '🍽️', name: '餐厅', color: '#ea580c' },
      travel: { icon: '✈️', name: '旅行', color: '#059669' },
      shopping: { icon: '🛍️', name: '购物', color: '#db2777' },
      goals: { icon: '🎯', name: '目标', color: '#2563eb' }
    };

    // ========== Nav ==========
    function goHome() { document.getElementById('homeView').classList.remove('hidden'); document.getElementById('detailView').classList.add('hidden'); document.getElementById('backBtn').classList.add('hidden'); currentListId = null; loadLists(); }
    function goDetail(id) { currentListId = id; document.getElementById('homeView').classList.add('hidden'); document.getElementById('detailView').classList.remove('hidden'); document.getElementById('backBtn').classList.remove('hidden'); loadDetail(id); }

    // ========== Lists ==========
    async function loadLists() { lists = await db.lists.toArray(); renderLists(); updateStats(); }
    
    function filterByTemplate(tpl) { currentFilter = tpl; renderLists(); }
    
    function renderLists() {
      const grid = document.getElementById('listsGrid'), empty = document.getElementById('emptyState');
      let filtered = currentFilter === 'all' ? lists : lists.filter(l => l.template === currentFilter);
      if (!filtered.length) { grid.innerHTML = ''; empty.classList.remove('hidden'); return; }
      empty.classList.add('hidden');
      grid.innerHTML = filtered.map(list => {
        const tpl = templates[list.template] || templates.default;
        const total = (list.items||[]).length, done = (list.items||[]).filter(i=>i.done).length;
        const pct = total ? Math.round(done/total*100) : 0;
        return `<div class="card border-l-4" style="border-left-color:${tpl.color}" onclick="goDetail(${list.id})">
          <div class="flex items-center gap-2"><span class="text-xl">${tpl.icon}</span><h3 class="font-semibold truncate flex-1">${escapeHtml(list.title)}</h3></div>
          <p class="text-sm text-[var(--muted)] mt-2">${total}项 · ${done}完成</p>
          <div class="mt-3 progress-bar"><div class="progress-fill" style="width:${pct}%;background:${tpl.color}"></div></div>
        </div>`;
      }).join('');
    }
    
    function updateStats() {
      document.getElementById('totalLists').textContent = lists.length;
      document.getElementById('totalItems').textContent = lists.reduce((s,l)=>s+(l.items||[]).length,0);
      document.getElementById('completedItems').textContent = lists.reduce((s,l)=>s+(l.items||[]).filter(i=>i.done).length,0);
    }

    // ========== Template Dialog ==========
    function showTemplateDialog() { document.getElementById('templateDialog').classList.remove('hidden'); document.getElementById('templateDialog').classList.add('flex'); selectedTemplate='default'; document.getElementById('listTitleInput').value=''; }
    function hideTemplateDialog() { document.getElementById('templateDialog').classList.add('hidden'); document.getElementById('templateDialog').classList.remove('flex'); }
    function selectTemplate(t) { selectedTemplate=t; document.querySelectorAll('.tpl-card').forEach(e=>e.classList.remove('border-black')); event.currentTarget.classList.add('border-black'); }
    
    async function createList() {
      const title = document.getElementById('listTitleInput').value.trim(); if(!title)return;
      await db.lists.add({title,template:selectedTemplate,items:[],lastModified:Date.now()});
      hideTemplateDialog(); loadLists(); showStatus('已创建');
    }

    // ========== Detail ==========
    async function loadDetail(id) {
      const list = await db.lists.get(id); if(!list)return;
      const tpl = templates[list.template]||templates.default;
      document.getElementById('detailTitle').textContent=list.title;
      document.getElementById('detailTemplate').textContent=tpl.icon;
      const total=(list.items||[]).length, done=(list.items||[]).filter(i=>i.done).length, pct=total?Math.round(done/total*100):0;
      document.getElementById('detailMeta').textContent=`${total}项 · ${done}完成`;
      document.getElementById('progressText').textContent=`${pct}%`;
      document.getElementById('progressBar').style.cssText=`width:${pct}%;background:${tpl.color}`;
      renderItems(list);
    }
    
    function filterItems(f) { itemFilter=f; if(currentListId)loadDetail(currentListId); }
    
    function renderItems(list) {
      const container = document.getElementById('itemsList');
      let items = list.items||[];
      if(itemFilter==='active') items=items.filter(i=>!i.done);
      if(itemFilter==='done') items=items.filter(i=>i.done);
      if(!items.length) { container.innerHTML='<div class="p-8 text-center text-[var(--muted)] text-sm">暂无条目</div>'; return; }
      container.innerHTML = items.map((item,idx)=>{
        const origIdx = list.items.findIndex(i=>i.createdAt===item.createdAt);
        const subtasks = item.subtasks||[];
        const subDone = subtasks.filter(s=>s.done).length;
        return `<div class="item-row p-3 border-b last:border-0 flex items-start gap-3 hover:bg-[var(--accent)] ${compactMode?'py-2':''}">
          <input type="checkbox" class="w-4 h-4 mt-1" ${item.done?'checked':''} onchange="toggleItem(${origIdx})">
          <div class="flex-1 min-w-0">
            <div class="flex items-start justify-between gap-2">
              <span class="item-text ${item.done?'line-through text-[var(--muted)]':''}">${escapeHtml(item.text)}</span>
              <div class="flex items-center gap-1">
                ${item.dueDate?`<span class="text-xs ${isOverdue(item.dueDate)?'text-red-500':'text-orange-500'}">📅 ${formatDate(item.dueDate)}</span>`:''}
                ${item.priority==='high'?`<span class="text-xs text-red-500">⚠️</span>`:''}
                <button onclick="deleteItem(${origIdx})" class="btn-icon text-red-500 w-6 h-6">🗑️</button>
              </div>
            </div>
            ${item.note?`<p class="item-meta text-[var(--muted)] mt-0.5">${escapeHtml(item.note)}</p>`:''}
            ${subtasks.length?`<div class="mt-2 ml-6 space-y-1">${subtasks.map((s,i)=>`<div class="flex items-center gap-2 text-sm"><input type="checkbox" class="w-3 h-3" ${s.done?'checked':''} onchange="toggleSubtask(${origIdx},${i})"><span class="${s.done?'line-through text-[var(--muted)]':''}">${escapeHtml(s.text)}</span></div>`).join('')}</div>`:''}
          </div>
        </div>`;
      }).join('');
    }
    
    function isOverdue(due) { return new Date(due) < new Date(); }

    // ========== Quick Add ==========
    async function quickAdd() {
      const input = document.getElementById('quickAddInput'), text = input.value.trim();
      if(!text||!currentListId)return;
      const parsed = parseNaturalLanguage(text);
      const list = await db.lists.get(currentListId); if(!list)return;
      list.items.push({text:parsed.text,note:parsed.note||'',done:false,dueDate:parsed.dueDate,priority:parsed.priority||'normal',subtasks:[],createdAt:Date.now()});
      await db.lists.update(currentListId,{items:list.items,lastModified:Date.now()});
      input.value=''; loadDetail(currentListId); showStatus('已添加');
    }
    
    function toggleSubtaskInput() { document.getElementById('subtaskInput').classList.toggle('hidden'); }
    
    async function addWithSubtasks() {
      const parentText = document.getElementById('parentItemInput').value.trim();
      const subtasksText = document.getElementById('subtasksInput').value.trim();
      if(!parentText||!currentListId)return;
      const subtasks = subtasksText.split('\n').filter(t=>t.trim()).map(t=>({text:t.trim(),done:false}));
      const list = await db.lists.get(currentListId); if(!list)return;
      list.items.push({text:parentText,note:'',done:false,dueDate:null,priority:'normal',subtasks,createdAt:Date.now()});
      await db.lists.update(currentListId,{items:list.items,lastModified:Date.now()});
      document.getElementById('parentItemInput').value=''; document.getElementById('subtasksInput').value=''; document.getElementById('subtaskInput').classList.add('hidden');
      loadDetail(currentListId); showStatus('已添加');
    }

    // ========== Item Ops ==========
    async function toggleItem(idx) { const list=await db.lists.get(currentListId);if(!list)return;list.items[idx].done=!list.items[idx].done;await db.lists.update(currentListId,{items:list.items,lastModified:Date.now()});loadDetail(currentListId); }
    async function deleteItem(idx) { const list=await db.lists.get(currentListId);if(!list)return;list.items.splice(idx,1);await db.lists.update(currentListId,{items:list.items,lastModified:Date.now()});loadDetail(currentListId);showStatus('已删除'); }
    async function toggleSubtask(itemIdx,subIdx) { const list=await db.lists.get(currentListId);if(!list)return;list.items[itemIdx].subtasks[subIdx].done=!list.items[itemIdx].subtasks[subIdx].done;await db.lists.update(currentListId,{items:list.items,lastModified:Date.now()});loadDetail(currentListId); }
    async function clearCompleted() { if(!confirm('删除所有已完成？'))return; const list=await db.lists.get(currentListId);if(!list)return;list.items=list.items.filter(i=>!i.done);await db.lists.update(currentListId,{items:list.items,lastModified:Date.now()});loadDetail(currentListId);showStatus('已清理'); }

    // ========== Natural Language ==========
    function parseNaturalLanguage(input) {
      const result = {text:input,note:'',dueDate:null,priority:'normal'};
      if(input.includes('高优先级')||input.includes('紧急')||input.includes('!')){result.priority='high';result.text=result.text.replace(/高优先级 | 紧急|!/g,'').trim();}
      [{p:/今天 | 今天/g,d:0},{p:/明天 | 明天/g,d:1},{p:/后天 | 后天/g,d:2},{p:/下周/g,d:7}].forEach(({p,d})=>{if(p.test(input)){const dt=new Date();dt.setDate(dt.getDate()+d);result.dueDate=dt.toISOString();result.text=result.text.replace(p,'').trim();}});
      if(input.includes('每天')||input.includes('每日')){result.note='每天重复';result.text=result.text.replace(/每天 | 每日/g,'').trim();}
      if(input.includes('每周')){result.note='每周重复';result.text=result.text.replace(/每周/g,'').trim();}
      return result;
    }
    
    function formatDate(iso) {
      const d=new Date(iso),today=new Date(),tomorrow=new Date();tomorrow.setDate(tomorrow.getDate()+1);
      if(d.toDateString()===today.toDateString())return'今天';
      if(d.toDateString()===tomorrow.toDateString())return'明天';
      return`${d.getMonth()+1}/${d.getDate()}`;
    }

    // ========== Settings ==========
    function showSettings() { document.getElementById('settingsDialog').classList.remove('hidden'); document.getElementById('settingsDialog').classList.add('flex'); }
    function hideSettings() { document.getElementById('settingsDialog').classList.add('hidden'); document.getElementById('settingsDialog').classList.remove('flex'); }
    function toggleCompactMode() { compactMode=!compactMode; document.getElementById('mainContainer').classList.toggle('compact'); showStatus(compactMode?'紧凑模式':'舒适模式'); }
    
    async function exportData() { const data=await db.lists.toArray(); const json=JSON.stringify({lists:data,exportedAt:new Date().toISOString()},null,2); const blob=new Blob([json],{type:'application/json'}); const url=URL.createObjectURL(blob); const a=document.createElement('a');a.href=url;a.download=`listapp-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(url);showStatus('已导出'); }
    function showImport() { const json=prompt('粘贴 JSON:'); if(!json)return; try{const data=JSON.parse(json);if(!data.lists)throw new Error('无效格式');data.lists.forEach(l=>db.lists.add(l));loadLists();showStatus('导入成功');hideSettings();}catch(e){alert('失败:'+e.message);} }
    async function clearAllData() { if(confirm('⚠️ 确定删除所有数据？')){await db.lists.clear();location.reload();} }
    
    function showStatus(msg) { const el=document.getElementById('status');el.textContent=msg;setTimeout(()=>el.textContent='',3000); }
    function escapeHtml(t) { const d=document.createElement('div');d.textContent=t;return d.innerHTML; }
    
    // ========== Init ==========
    loadLists();
  </script>
</body>
</html>
