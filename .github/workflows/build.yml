name: Build & Test

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      
    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon
      
    - name: Run Unit Tests
      run: ./gradlew testDebugUnitTest --no-daemon
      continue-on-error: true
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
        
    - name: Create Release (on master push)
      if: github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v1
      with:
        files: app/build/outputs/apk/debug/app-debug.apk
        tag_name: debug-${{ github.run_number }}
        name: "Debug Build #${{ github.run_number }}"
        body: |
          Auto-built debug APK from commit ${{ github.sha }}
          
          Download: `app-debug.apk`
          
          [View CI logs](https://github.com/Fizzzli/list-app/actions/runs/${{ github.run_id }})
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
